<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gasolineras Castellón</title>

<style>
.gas-app {
  --card: #ffffff;
  --accent: #16a34a;
  --accent-soft: #22c55e;
  --text: #111827;
  --muted: #4b5563;
  --danger: #dc2626;
  --border: #e5e7eb;

  font-family: system-ui, -apple-system, sans-serif;
  color: var(--text);
}

.gas-app .header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

.gas-app .header button {
  padding: 6px 10px;
}

.gas-app h2, .gas-app h3 {
  color: var(--text);
}

.gas-app .container {
  max-width: 900px;
  position: relative;
}

/* CONTROLES */
.gas-app .controls {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.gas-app .field {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 140px;
}

.gas-app label {
  font-size: 0.8rem;
  color: var(--muted);
  font-weight: 600;
}

.gas-app select {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 8px;
  border-radius: 8px;
}

/* CHIPS */
.gas-app .cp-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.gas-app .chip {
  border: 1px solid var(--border);
  padding: 6px 10px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.8rem;
  background: #fff;
}

.gas-app .chip.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

/* RESUMEN */
.gas-app .resumen {
  background: #f9fafb;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 20px;
}

.gas-app .resumen strong {
  font-size: 1.2rem;
  color: var(--accent);
}

/* LISTAS */
.gas-app .lista {
  display: grid;
  gap: 10px;
}

.gas-app .card {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  background: #fff;
}

.gas-app .precio {
  font-weight: bold;
  color: var(--accent);
}

.gas-app .precio.caro {
  color: var(--danger);
}

/* BOTÓN */
.gas-app .toggle {
  border: 1px solid var(--border);
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
  margin: 10px 0;
}

.gas-app .meta {
  display: block;
  margin-top: 6px;
  font-size: 0.8rem;
  color: var(--muted);
}

/* LOADER */
.gas-app .loader {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
}

.gas-app .hidden {
  display: none;
}

/* GPS */
.gas-app .gps-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.gas-app .btn-gps {
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  background: var(--card);
  color: var(--text);
  font-size: 0.85rem;
  white-space: nowrap;
}

.gas-app .btn-gps.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.gas-app .gps-status {
  font-size: 0.8rem;
  color: var(--muted);
}

.gas-app .dist {
  display: inline-block;
  margin-top: 4px;
  font-size: 0.8rem;
  color: var(--muted);
}

/* MOBILE */
@media (max-width:600px) {
  .gas-app .controls {
    flex-direction: column;
  }
}

/* MODO OSCURO AUTOMÁTICO */
@media (prefers-color-scheme: dark) {
  .gas-app {
    --card: #111827;
    --accent: #22c55e;
    --accent-soft: #4ade80;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --danger: #ef4444;
    --border: #1f2937;
  }

  /* fondo tarjetas */
  .gas-app .card {
    background: var(--card);
    border-color: var(--border);
  }

  /* selects */
  .gas-app select {
    background: var(--card);
    color: var(--text);
    border-color: var(--border);
  }

  /* chips */
  .gas-app .chip {
    background: #111827;
    border-color: var(--border);
    color: var(--text);
  }

  .gas-app .chip.active {
    background: var(--accent);
    color: #022c22;
  }

  /* resumen */
  .gas-app .resumen {
    background: #111827;
    border-color: var(--border);
  }

  /* botón */
  .gas-app .toggle {
    background: #111827;
    border-color: var(--border);
    color: var(--text);
  }

  .gas-app .toggle:hover {
    background: #1f2937;
  }

  /* loader */
  .gas-app .loader {
    background: rgba(17, 24, 39, 0.7);
  }
}
</style>
</head>

<body>

<div class="gas-app">
  <div class="container">

    <div id="loader" class="loader hidden">⏳</div>
	
	<div class="header">
		<h2>⛽ Gasolineras Castellón</h2>
		<button id="refreshBtn" class="toggle">🔄</button>		
	</div>

    <div class="controls">
      <div class="field">
        <label>Combustible</label>
        <select id="fuel">
          <option value="Precio Gasoleo A">Diésel</option>
          <option value="Precio Gasolina 95 E5">Gasolina 95</option>
          <option value="Precio Gasolina 98 E5">Gasolina 98</option>
        </select>
      </div>

      <div class="field">
        <label>Vehículo</label>
		<select id="vehiculo">
		  <option value="40">Utilitario (40L)</option>
		  <option value="50" selected>Compacto (50L)</option>
		  <option value="60">Berlina (60L)</option>
		  <option value="65">SUV (65L)</option>
		  <option value="80">Furgoneta (80L)</option>
		</select>
      </div>

      <div class="field">
        <label>Zonas</label>
        <div id="cpFilters" class="cp-filters"></div>
      </div>
    </div>

    <div class="gps-bar">
      <button id="gpsBtn" class="btn-gps">📍 Cerca de mí</button>
      <span id="gpsStatus" class="gps-status"></span>
    </div>

    <div id="resumen" class="resumen"></div>

    <h3 id="tituloBaratas">Más baratas</h3>
    <div id="baratas" class="lista"></div>

    <button id="toggle" class="toggle hidden"></button>
    <div id="todas" class="lista hidden"></div>

    <div id="seccionCaras">
      <h3>Más caras</h3>
      <div id="caras" class="lista"></div>
    </div>

  </div>
</div>

<script>
const TODOS_CP = ["12001","12002","12003","12004","12005","12006","12100"];
const URL = "https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/";

let cpSeleccionados = [];
let posGPS = null;
let modoGPS = false;

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

const parsePrecio = p => parseFloat(p.replace(",", "."));

function cargarConfig() {
  fuel.value = localStorage.getItem("fuel") || "Precio Gasoleo A";
  vehiculo.value = localStorage.getItem("vehiculo") || "50";
}

function initCPFilters() {
  const guardados = localStorage.getItem("cp");
  cpSeleccionados = guardados ? JSON.parse(guardados) : [...TODOS_CP];

  cpFilters.innerHTML = TODOS_CP.map(cp => `
    <div class="chip ${cpSeleccionados.includes(cp) ? "active" : ""}" data-cp="${cp}">
      ${cp === "12100" ? "Grao" : cp}
    </div>
  `).join("");

  document.querySelectorAll(".chip").forEach(el => {
    el.addEventListener("click", () => {
      const cp = el.dataset.cp;

      if (cpSeleccionados.includes(cp)) {
        if (cpSeleccionados.length === 1) return;
        cpSeleccionados = cpSeleccionados.filter(c => c !== cp);
        el.classList.remove("active");
      } else {
        cpSeleccionados.push(cp);
        el.classList.add("active");
      }

      localStorage.setItem("cp", JSON.stringify(cpSeleccionados));
      cargar();
    });
  });
  
  refreshBtn.addEventListener("click", async () => {
		  refreshBtn.disabled = true;
		  refreshBtn.innerText = "🔄";

		  await cargar(true);

		  refreshBtn.disabled = false;
		  refreshBtn.innerText = "🔄";
	});
}

gpsBtn.addEventListener("click", () => {
  if (modoGPS) {
    modoGPS = false;
    posGPS = null;
    gpsBtn.classList.remove("active");
    gpsStatus.textContent = "";
    cargar();
    return;
  }

  if (!navigator.geolocation) {
    gpsStatus.textContent = "GPS no disponible";
    return;
  }

  gpsStatus.textContent = "Obteniendo posición…";
  navigator.geolocation.getCurrentPosition(
    pos => {
      posGPS = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      modoGPS = true;
      gpsBtn.classList.add("active");
      gpsStatus.textContent = "";
      cargar();
    },
    () => {
      gpsStatus.textContent = "Permiso denegado";
    }
  );
});


fuel.addEventListener("change", onChange);
vehiculo.addEventListener("change", onChange);

function onChange() {
  localStorage.setItem("fuel", fuel.value);
  localStorage.setItem("vehiculo", vehiculo.value);
  cargar();
}

function limpiar(e, fuel) {
  if (!e[fuel]) return null;
  const precio = parsePrecio(e[fuel]);
  if (isNaN(precio)) return null;
  const lat = parsePrecio(e["Latitud"]);
  const lon = parsePrecio(e["Longitud (WGS84)"]);
  return {
    nombre: e["Rótulo"],
    direccion: e["Dirección"],
    cp: e["C.P."],
    precio,
    lat: isNaN(lat) ? null : lat,
    lon: isNaN(lon) ? null : lon,
  };
}

let abierto = false;

toggle.addEventListener("click", () => {
  abierto = !abierto;
  todas.classList.toggle("hidden");
  toggle.innerText = abierto ? "Ocultar" : toggle.dataset.texto;
});


async function cargar(forceRefresh = false) {
  loader.classList.remove("hidden");

  try {
    const fuelSel = fuel.value;
    const litrosSel = parseFloat(vehiculo.value);

    console.log("FETCH API VERCEL");

    const url = forceRefresh
				  ? "/api/gasolineras?refresh=true"
				  : "/api/gasolineras";
	const res = await fetch(url);
    const json = await res.json();

    // adaptar a tu estructura actual
    const data = { ListaEESSPrecio: json.estaciones };
    const fechaActualizacion = new Date(json.fecha);

    // 🔄 procesado
    let lista = data.ListaEESSPrecio
      .filter(e => cpSeleccionados.includes(e["C.P."]))
      .map(e => limpiar(e, fuelSel))
      .filter(e => e);

    if (!lista.length) {
      resumen.innerText = "Sin datos";
      loader.classList.add("hidden");
      return;
    }

    if (modoGPS && posGPS) {
      lista.forEach(e => {
        e.dist = (e.lat != null && e.lon != null)
          ? haversine(posGPS.lat, posGPS.lon, e.lat, e.lon)
          : null;
      });
      lista.sort((a,b) => (a.dist ?? Infinity) - (b.dist ?? Infinity));
      tituloBaratas.textContent = "Más cercanas";
      seccionCaras.classList.add("hidden");
    } else {
      lista.sort((a,b) => a.precio - b.precio);
      tituloBaratas.textContent = "Más baratas";
      seccionCaras.classList.remove("hidden");
    }

    const min = lista[0].precio;
    const max = lista[lista.length-1].precio;
    const media = lista.reduce((a,b)=>a+b.precio,0)/lista.length;
    const ahorro = (max-min)*litrosSel;
    const diferencia = max - min;

    // 🕒 hora
    const hora = fechaActualizacion.toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit'
    });

    resumen.innerHTML = `
      <strong>
        ${media.toFixed(3)} €/L media<br>
        Diferencia: ${diferencia.toFixed(3)} €/L<br>
        Ahorro máximo (vs más cara): ${ahorro.toFixed(2)} €
      </strong>
      <span class="meta">Actualizado hoy a las ${hora}</span>
    `;

    // 📊 listas
    const topBaratas = lista.slice(0,3);
    const topCaras = lista.slice(-3).reverse();
    const resto = lista.slice(3,-3);

    baratas.innerHTML = topBaratas.map(e=>card(e,false)).join("");
    caras.innerHTML = topCaras.map(e=>card(e,true)).join("");

    if (resto.length > 0) {
      toggle.classList.remove("hidden");
      toggle.dataset.texto = `Ver más (${resto.length})`;
      toggle.innerText = toggle.dataset.texto;
      todas.innerHTML = resto.map(e=>card(e,false)).join("");
    } else {
      toggle.classList.add("hidden");
      todas.classList.add("hidden");
    }

  } catch (err) {
    console.error(err);
    resumen.innerText = "Error cargando datos";
  }

  loader.classList.add("hidden");
}



function card(e, caro) {
  const distStr = e.dist != null
    ? `<span class="dist">📍 ${e.dist < 1 ? Math.round(e.dist * 1000) + ' m' : e.dist.toFixed(1) + ' km'}</span>`
    : '';
  return `<div class="card">
    <div class="precio ${caro?"caro":""}">
      ${e.precio.toFixed(3)} €/L
    </div>
    <b>${e.nombre}</b><br>
    ${e.direccion}
    ${distStr}
  </div>`;
}

cargarConfig();
initCPFilters();
cargar();
</script>

</body>
</html>
